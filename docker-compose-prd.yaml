name: hook0-prd

volumes:
  postgres-data:
  mailpit-data:

services:
  postgres:
    image: postgres:18
    volumes:
      - postgres-data:/var/lib/postgresql
    environment:
      - POSTGRES_USER=${SERVICE_USER_POSTGRES}
      - POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}
      - POSTGRES_DB=${POSTGRES_DB:-hook0}
    ports:
      - "5432:5432"
    networks:
      - hook0
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d $${POSTGRES_DB}"]
      timeout: 1s
      interval: 5s
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      args:
        FEATURES: "application-secret-compatibility"
    environment:
      - IP=0.0.0.0
      - PORT=8081
      - CORS_ALLOWED_ORIGINS=https://hook0.andeanwide.xyz
      - DATABASE_URL=postgres://${SERVICE_USER_POSTGRES}:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/${POSTGRES_DB:-hook0}
      - SMTP_CONNECTION_URL=${SMTP_CONNECTION_URL:?SMTP_CONNECTION_URL is required}
      - EMAIL_SENDER_ADDRESS=${EMAIL_SENDER_ADDRESS:?EMAIL_SENDER_ADDRESS is required}
      - APP_URL=https://hook0.andeanwide.xyz
      - BISCUIT_PRIVATE_KEY=${BISCUIT_PRIVATE_KEY:?BISCUIT_PRIVATE_KEY is required}
    ports:
      - "8081:8081"
    networks:
      - hook0
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --user-agent 'healthcheck' http://localhost:8081/api/v1/swagger.json || exit 1"]
      timeout: 5s
      interval: 15s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      - API_ENDPOINT=https://api.hook0.andeanwide.xyz/api/v1
    ports:
      - "8001:80"
    networks:
      - hook0
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --user-agent 'docker-compose-healthcheck' http://localhost || exit 1"]
      timeout: 1s
      interval: 5s
    depends_on:
      api:
        condition: service_healthy

  output-worker:
    build:
      context: .
      dockerfile: output-worker/Dockerfile
    environment:
      - DATABASE_URL=postgres://${SERVICE_USER_POSTGRES}:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/${POSTGRES_DB:-hook0}
      - WORKER_NAME=default
      - DISABLE_TARGET_IP_CHECK=true
    networks:
      - hook0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy

networks:
  hook0:
    driver: bridge
